<!DOCTYPE html>
<html>
<head>
  <title>AI Lead Engine</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<div class="topbar">
  <div class="title">⚡ AI LEAD ENGINE // EVJE NODE</div>
  <p style="color:#94a3b8; font-size:12px;">
    autonomous business discovery system
  </p>
</div>

<div style="padding: 20px;">
  <button class="btn" onclick="loadLeads()">
    GENERATE LEADS
  </button>
</div>

<!-- TERMINAL -->
<div class="terminal" id="terminal">
  > system ready...
</div>

<!-- GRID -->
<div id="grid" class="grid"></div>

<script>
  async function loadLeads() {
    const terminal = document.getElementById("terminal");
    const grid = document.getElementById("grid");

    terminal.innerHTML += "\n> scanning Evje business network...";
    terminal.innerHTML += "\n> connecting to Maps API...";
    terminal.innerHTML += "\n> running AI scoring engine...";

    const res = await fetch("/api/leads");
    const data = await res.json();

    terminal.innerHTML += "\n> leads found: " + data.length;
    terminal.innerHTML += "\n> rendering dashboard...\n";

    grid.innerHTML = "";

    data.forEach((lead, i) => {
      setTimeout(() => {
        terminal.innerHTML += `> processing ${lead.name}\n`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
                <div class="card-title">${lead.name}</div>
                <div>${lead.industry}</div>
                <div class="score">Score: ${lead.score}/5</div>
                <div class="reason">${lead.reason}</div>
            `;

        grid.appendChild(card);

        terminal.scrollTop = terminal.scrollHeight;

      }, i * 150);
    });

    terminal.innerHTML += "\n> COMPLETE <span class='cursor'></span>";
  }
</script>

</body>
</html>
