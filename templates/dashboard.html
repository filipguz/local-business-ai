<!DOCTYPE html>
<html>
<head>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- EMAIL MODAL -->
<div id="emailModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6 w-full max-w-lg">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modalTitle" class="font-bold text-base text-white">Genererer e-post...</h3>
      <button onclick="closeModal()" class="text-zinc-500 hover:text-white text-xl leading-none">✕</button>
    </div>

    <div id="modalLoading" class="py-8 text-center text-zinc-400 text-sm">
      Skriver e-post med AI...
    </div>

    <div id="modalBody" class="hidden">
      <textarea id="emailText"
                class="w-full h-52 bg-zinc-950 border border-zinc-700 rounded-xl p-4 text-sm text-gray-200 resize-none focus:outline-none focus:border-cyan-600"
                readonly></textarea>
      <div class="flex gap-3 mt-4">
        <button onclick="copyEmail()"
                class="flex-1 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold py-2 rounded-lg text-sm transition">
          Kopier e-post
        </button>
        <button onclick="closeModal()"
                class="px-4 py-2 border border-zinc-700 hover:border-zinc-500 text-zinc-400 hover:text-white rounded-lg text-sm transition">
          Lukk
        </button>
      </div>
    </div>

    <div id="modalError" class="hidden py-4">
      <p id="modalErrorText" class="text-red-400 text-sm text-center"></p>
      <div class="mt-4 text-center">
        <a href="/pricing" class="text-cyan-400 text-sm hover:underline">Oppgrader til Pro →</a>
      </div>
    </div>
  </div>
</div>

<div class="flex">

  <!-- SIDEBAR -->
  <div class="w-64 h-screen bg-zinc-950 p-6 border-r border-zinc-800 flex-shrink-0 relative">
    <h1 class="text-cyan-400 font-bold text-lg mb-6">AI Lead Engine</h1>

    <a href="/app" class="block mb-2 text-sm hover:text-cyan-400">Dashboard</a>
    <a href="/pricing" class="block mb-2 text-sm hover:text-cyan-400">Pricing</a>
    <a href="/logout" class="block mb-2 text-sm text-red-400">Logout</a>

    <div class="mt-10 p-3 bg-zinc-900 rounded-xl border border-zinc-800">
      <p class="text-xs text-gray-400">Plan</p>
      <p id="planBadge" class="text-cyan-400 font-bold capitalize">–</p>
    </div>

    <div class="mt-4 p-3 bg-zinc-900 rounded-xl border border-zinc-800">
      <p class="text-xs text-gray-400">Resultat</p>
      <p id="resultCount" class="text-white font-bold">–</p>
    </div>

    <div class="absolute bottom-6 left-0 w-64 text-center text-xs text-zinc-700">
      Laget av
      <a href="https://github.com/filipguz" target="_blank" rel="noopener" class="text-zinc-500 hover:text-cyan-400 transition">
        github/filipguz
      </a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-10 overflow-y-auto">

    <!-- HEADER -->
    <div class="mb-8">
      <h2 class="text-2xl font-bold mb-1">Lead-søk</h2>
      <p class="text-sm text-zinc-500">Søk etter lokale bedrifter i hele Norge. AI scorer og analyserer hvert resultat.</p>
    </div>

    <!-- SEARCH -->
    <div class="flex gap-3 mb-8">
      <input id="searchInput"
             type="text"
             placeholder="f.eks. tannlege Bergen, rørlegger Stavanger, frisør Tromsø..."
             class="flex-1 px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-xl text-white placeholder-zinc-500 focus:outline-none focus:border-cyan-500 transition text-sm"
             onkeydown="if(event.key==='Enter') loadLeads()">
      <button onclick="loadLeads()"
              id="searchBtn"
              class="bg-cyan-500 hover:bg-cyan-400 disabled:opacity-50 disabled:cursor-not-allowed transition text-black px-6 py-3 rounded-xl font-semibold text-sm whitespace-nowrap">
        Søk leads
      </button>
    </div>

    <!-- STATUS -->
    <div id="statusMsg" class="hidden mb-4 text-xs text-zinc-500"></div>

    <!-- GRID -->
    <div id="output" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

  </div>

</div>

<script>
  const csrfToken = document.querySelector('meta[name="csrf-token"]').content;

  const state = {
    loading: false,
    data: null,
    error: null,
    plan: null,
  };

  function escapeHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function scoreStyle(score) {
    if (score >= 8) return "bg-green-500/20 text-green-400 border-green-500/30";
    if (score >= 6) return "bg-yellow-500/20 text-yellow-300 border-yellow-500/30";
    return "bg-red-500/20 text-red-400 border-red-500/30";
  }

  function render() {
    const outputEl = document.getElementById("output");
    const statusEl = document.getElementById("statusMsg");
    const planEl   = document.getElementById("planBadge");
    const countEl  = document.getElementById("resultCount");

    if (state.loading) {
      outputEl.innerHTML = `
        <div class="col-span-3 py-16 text-center">
          <div class="text-zinc-400 text-sm animate-pulse">Henter og analyserer leads...</div>
        </div>`;
      return;
    }

    if (state.error) {
      outputEl.innerHTML = `<div class="col-span-3 text-red-400 text-sm">${escapeHtml(state.error)}</div>`;
      return;
    }

    if (!state.data) return;

    const leads = state.data.data ?? [];
    planEl.innerText  = escapeHtml(state.data.plan) || "–";
    countEl.innerText = leads.length + " leads";

    statusEl.classList.remove("hidden");
    statusEl.innerText = escapeHtml(state.data.message ?? "");

    const isPro = state.data.plan === "pro";

    outputEl.innerHTML = leads.map((lead, i) => `
      <div class="bg-zinc-900/60 backdrop-blur border border-zinc-800 rounded-2xl p-5 flex flex-col">

        <div class="flex items-start justify-between mb-3">
          <div class="flex-1 min-w-0 mr-3">
            <h3 class="text-base font-semibold leading-tight">${escapeHtml(lead.name)}</h3>
            <p class="text-xs text-cyan-400 mt-1">${escapeHtml(lead.industry)}</p>
          </div>
          <div class="px-2.5 py-1 rounded-full text-xs border flex-shrink-0 ${scoreStyle(lead.score)}">
            ${escapeHtml(lead.score)}/10
          </div>
        </div>

        <p class="text-sm text-gray-300 leading-relaxed mb-4 flex-1">
          ${escapeHtml(lead.reason)}
        </p>

        <div class="border-t border-zinc-800 pt-3 mt-auto flex items-center justify-between">
          <span class="text-xs text-zinc-500">Nettside: ${escapeHtml(lead.website_quality)}</span>
          ${isPro
            ? `<button onclick='openEmailModal(${i})'
                       class="text-xs text-cyan-400 hover:text-cyan-300 transition font-medium">
                 ✉ Generer e-post
               </button>`
            : `<a href="/pricing" class="text-xs text-zinc-600 hover:text-zinc-400 transition">
                 ✉ Pro-funksjon
               </a>`
          }
        </div>

      </div>
    `).join("");

    // Cache leads for modal access
    window._leads = leads;
  }

  async function loadLeads() {
    const query = document.getElementById("searchInput").value.trim();
    const btn   = document.getElementById("searchBtn");

    state.loading = true;
    state.error   = null;
    btn.disabled  = true;
    render();

    try {
      const url = query ? `/api/leads?q=${encodeURIComponent(query)}` : "/api/leads";
      const res = await fetch(url);
      if (!res.ok) throw new Error("Serverfeil " + res.status);
      state.data    = await res.json();
      state.loading = false;
      render();
    } catch (err) {
      state.error   = err.message;
      state.loading = false;
      render();
    } finally {
      btn.disabled = false;
    }
  }

  // ── Email modal ──────────────────────────────────────────────

  function openEmailModal(leadIndex) {
    const lead = window._leads?.[leadIndex];
    if (!lead) return;

    const modal     = document.getElementById("emailModal");
    const title     = document.getElementById("modalTitle");
    const loading   = document.getElementById("modalLoading");
    const body      = document.getElementById("modalBody");
    const errorDiv  = document.getElementById("modalError");
    const errorText = document.getElementById("modalErrorText");

    title.innerText = `E-post til ${lead.name}`;
    loading.classList.remove("hidden");
    body.classList.add("hidden");
    errorDiv.classList.add("hidden");
    modal.classList.remove("hidden");

    fetchEmail(lead)
      .then(text => {
        document.getElementById("emailText").value = text;
        loading.classList.add("hidden");
        body.classList.remove("hidden");
      })
      .catch(err => {
        loading.classList.add("hidden");
        errorText.innerText = err.message;
        errorDiv.classList.remove("hidden");
      });
  }

  async function fetchEmail(lead) {
    const res = await fetch("/api/email", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken,
      },
      body: JSON.stringify(lead),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Noe gikk galt");
    }

    return data.email;
  }

  function closeModal() {
    document.getElementById("emailModal").classList.add("hidden");
  }

  function copyEmail() {
    const text = document.getElementById("emailText").value;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector("#modalBody button");
      btn.innerText = "Kopiert!";
      setTimeout(() => { btn.innerText = "Kopier e-post"; }, 2000);
    });
  }

  // Close modal on backdrop click
  document.getElementById("emailModal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });

  // Close modal on Escape
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
  });
</script>

</body>
</html>
