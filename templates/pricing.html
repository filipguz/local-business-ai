<!DOCTYPE html>
<html>
<head>
    <title>Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div class="text-center py-20">

    <h1 class="text-4xl font-bold text-cyan-400 mb-10">
        Choose Your Plan
    </h1>

    <div class="flex justify-center gap-10">

        <!-- FREE -->
        <div class="border border-cyan-500/20 p-8 rounded-xl w-64">
            <h2 class="text-xl font-bold mb-2">Free</h2>
            <p class="text-gray-400 mb-4">Basic lead access</p>
            <a href="/register"
               class="block bg-gray-700 text-white py-2 rounded-lg">
                Start Free
            </a>
        </div>

        <!-- PRO -->
        <div class="border border-cyan-500 p-8 rounded-xl w-64">
            <h2 class="text-xl font-bold text-cyan-400 mb-2">Pro</h2>
            <p class="text-gray-400 mb-4">Unlimited AI leads</p>
            <a href="/checkout"
               class="block bg-cyan-500 text-black py-2 rounded-lg font-bold">
                Upgrade
            </a>
        </div>

    </div>

</div>

</body>
</html>
